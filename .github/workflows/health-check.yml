name: Health Check

on:

  schedule:
    - cron: '0 */12 * * *'

  workflow_dispatch:

jobs:

  health:

    runs-on: ubuntu-latest

    steps:

      - name: Pull image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name app \
          ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest

      - name: Wait
        run: sleep 5

      - name: Health check
        run: |
          curl http://localhost:5000/health

      - name: Cleanup
        run: |
          docker stop app
          docker rm app

      - name: Summary
        run: |
          echo "## Health Report" >> $GITHUB_STEP_SUMMARY
          echo "Status PASSED" >> $GITHUB_STEP_SUMMARY
          echo "Time $(date)" >> $GITHUB_STEP_SUMMARY