name: Secrets Demo

on:
  push:

jobs:
  secrets-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets exesist
        run: echo "Secret is set - true" 

      - name: Print secret value
        run: echo "Secret value:" ${{ secrets.MY_SECRET_MESSAGE }}
      - name: Use secret safely
        env:
          SECRET_VALUE: ${{ secrets.MY_SECRET_MESSAGE }}

        run: |
          echo "Secret loaded successfully"