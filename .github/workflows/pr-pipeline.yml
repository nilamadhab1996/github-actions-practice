name: PR Pipeline

on:
  pull_request:
    branches:
      - main

jobs:

  build:

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      python_version: "3.11"
      run_tests: true

  pr-comment:

    runs-on: ubuntu-latest

    needs: build

    steps:
      - run: echo "PR checks passed for ${{ github.head_ref }}"