name: Call Reusable Workflow

on:
  push:
    branches:
      - main

jobs:

  build:

    uses: ./.github/workflows/reusable-build.yml

    with:
      app_name: "my-web-app"
      environment: "production"

    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  show-version:

    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: Print version
        run: echo "Version ${{ needs.build.outputs.build_version }}"