name: Docker CI

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          if [ -z "${{ var.DOCKERHUB_USER }}" ]; then echo "DOCKERHUB_USER missing"; else echo "DOCKERHUB_USER OK"; fi
          if [ -z "${{ secrets.DOCKER_TOKEN }}" ]; then echo "DOCKER_TOKEN missing"; else echo "DOCKER_TOKEN OK"; fi

      - name: Login Docker
        uses: docker/login-action@v3

        with:
          username: ${{ var.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6

        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/ci-cd-automation-github-actions:latest